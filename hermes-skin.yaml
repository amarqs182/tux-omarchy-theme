# Amber Dawn — Hermes TUI skin aligned with Omarchy Linux Light Design System
# Linux Yellow (#F5B700) on #F5F5F3, high contrast for light terminals

name: amber-dawn
description: "Omarchy Linux Light — Linux Yellow on warm ivory, high contrast light mode skin"

colors:
  # Banner
  banner_border: "#E5E7EB"
  banner_title: "#F5B700"
  banner_accent: "#F5B700"
  banner_dim: "#6B7280"
  banner_text: "#222222"

  # UI
  ui_accent: "#F5B700"
  ui_primary: "#F5B700"
  ui_label: "#F5B700"
  ui_ok: "#22C55E"
  ui_error: "#EF4444"
  ui_warn: "#F59E0B"
  ui_border: "#E5E7EB"
  ui_text: "#222222"

  # Prompt
  prompt: "#222222"
  input_rule: "#E5E7EB"

  # Response box
  response_border: "#F5B700"

  # Status bar (light background)
  status_bar_bg: "#F5F5F3"
  status_bar_text: "#6B7280"
  status_bar_strong: "#F5B700"
  status_bar_dim: "#6B7280"
  status_bar_good: "#22C55E"
  status_bar_warn: "#F59E0B"
  status_bar_bad: "#EF4444"
  status_bar_critical: "#DC2626"

  # Session
  session_label: "#F5B700"
  session_border: "#D1D5DB"

  # Voice
  voice_status_bg: "#F5F5F3"

  # Selection & completion (light bg)
  selection_bg: "#E5E7EB"
  completion_menu_bg: "#FFFFFF"
  completion_menu_current_bg: "#E5E7EB"
  completion_menu_meta_bg: "#F8F8F8"
  completion_menu_meta_current_bg: "#E5E7EB"

  # Shell
  shell_dollar: "#3B82F6"

branding:
  agent_name: "Hermes Agent"
  welcome: "Amber Dawn — Linux Light theme active. Type your message or /help for commands."
  goodbye: "Goodbye! ⚕"
  response_label: " ⚕ Hermes "
  prompt_symbol: "❯"
  help_header: "(^_^)? Commands"

tool_prefix: "┊"
