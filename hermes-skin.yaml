# Amber Dawn — Hermes TUI skin for light terminal backgrounds
# Warm amber/gold palette on soft ivory, high contrast for readability

name: amber-dawn
description: "Warm amber on ivory — light mode skin for Amber Dawn Omarchy theme"

colors:
  # Banner
  banner_border: "#B07508"
  banner_title: "#8B6914"
  banner_accent: "#8E6010"
  banner_dim: "#6A6460"
  banner_text: "#2E2A28"

  # UI
  ui_accent: "#8E6010"
  ui_primary: "#8B6914"
  ui_label: "#8E6010"
  ui_ok: "#2E7D32"
  ui_error: "#C62828"
  ui_warn: "#E65100"
  ui_border: "#7A4F1F"
  ui_text: "#2E2A28"

  # Prompt
  prompt: "#2E2A28"
  input_rule: "#B07508"

  # Response box
  response_border: "#B07508"

  # Status bar (light background)
  status_bar_bg: "#EDE8E6"
  status_bar_text: "#3A3634"
  status_bar_strong: "#8B6914"
  status_bar_dim: "#6A6460"
  status_bar_good: "#2E7D32"
  status_bar_warn: "#8B6914"
  status_bar_bad: "#D84315"
  status_bar_critical: "#B71C1C"

  # Session
  session_label: "#8E6010"
  session_border: "#6A6460"

  # Voice
  voice_status_bg: "#EDE8E6"

  # Selection & completion (light bg)
  selection_bg: "#D8D0CA"
  completion_menu_bg: "#EDE8E6"
  completion_menu_current_bg: "#D8D0CA"
  completion_menu_meta_bg: "#EDE8E6"
  completion_menu_meta_current_bg: "#D8D0CA"

  # Shell
  shell_dollar: "#2E6BA6"

branding:
  agent_name: "Hermes Agent"
  welcome: "Amber Dawn light mode active. Type your message or /help for commands."
  goodbye: "Goodbye! ⚕"
  response_label: " ⚕ Hermes "
  prompt_symbol: "❯"
  help_header: "(^_^)? Commands"

tool_prefix: "┊"
