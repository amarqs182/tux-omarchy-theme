# Amber Dawn — Hermes TUI skin aligned with Omarchy Design System
# Linux Yellow (#F5B700) on #F5F5F3, high contrast for light terminals

name: amber-dawn
description: "Omarchy Linux Light — Linux Yellow on warm ivory, high contrast light mode skin"

colors:
  # Banner
  banner_border: "#E5E7EB"
  banner_title: "#8E6A00"
  banner_accent: "#8E6A00"
  banner_dim: "#69707E"
  banner_text: "#222222"

  # UI
  ui_accent: "#8E6A00"
  ui_primary: "#8E6A00"
  ui_label: "#8E6A00"
  ui_ok: "#16803D"
  ui_error: "#CD3A3A"
  ui_warn: "#8E6A00"
  ui_border: "#E5E7EB"
  ui_text: "#222222"

  # Prompt
  prompt: "#222222"
  input_rule: "#E5E7EB"

  # Response box
  response_border: "#F5B700"

  # Status bar (light background)
  status_bar_bg: "#F5F5F3"
  status_bar_text: "#555B66"
  status_bar_strong: "#8E6A00"
  status_bar_dim: "#69707E"
  status_bar_good: "#16803D"
  status_bar_warn: "#8E6A00"
  status_bar_bad: "#CD3A3A"
  status_bar_critical: "#B71C1C"

  # Session
  session_label: "#8E6A00"
  session_border: "#69707E"

  # Voice
  voice_status_bg: "#F5F5F3"

  # Selection & completion (light bg)
  selection_bg: "#E5E7EB"
  completion_menu_bg: "#F5F5F3"
  completion_menu_current_bg: "#E5E7EB"
  completion_menu_meta_bg: "#F5F5F3"
  completion_menu_meta_current_bg: "#E5E7EB"

  # Shell
  shell_dollar: "#316DCE"

branding:
  agent_name: "Omarchy"
  welcome: "Linux Light theme active. Type your message or /help for commands."
  goodbye: "Goodbye! ⚕"
  response_label: " ⚕ Omarchy "
  prompt_symbol: "❯"
  help_header: "(^_^)? Commands"

tool_prefix: "┊"
