# Tux theme — Hyprland border colors (overrides template-generated hyprland.conf)
# Linux Yellow (#F5B700) accent with warm ivory (#F5F5F3) background

$activeBorderColor = rgba(F5B700ee) rgba(7A5C00ee) 45deg
$inactiveBorderColor = rgba(D1D5DBaa)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
}

decoration {
    shadow {
        color = rgba(1a1a1aee)
    }
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor

    groupbar {
        text_color = rgba(F5B700ff)
        text_color_inactive = rgba(222222aa)
        col.active = rgba(F5B70030)
        col.inactive = rgba(D1D5DB40)
    }
}
